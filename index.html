<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Papers-Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game">
 <div class="rps-game">
        <div class="title">
            <h2>Rock - Paper - Scissors Game</h2>
        </div>
        
        <div class="displayResult"></div>

        <div class="buttons">
            <button id="rockButtton">✊</button>
            <button id="paperButtton">✋</button>
            <button id="scissorsButtton">✌️</button>
        </div>

        <div class="choices">
            <p id="playerChoice"> </p> 
            <p id="computerChoice"></p> 
        </div>

        <div class="scores">
            <p id="compScore"></p>
            <p id="playerScore"></p>
        </div>

        <div id="winnerDisplay"></div>



    </div>
    </div>
   



    <script src="script.js"></script>
</body>
</html>
